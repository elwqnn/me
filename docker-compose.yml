services:
  app:
    image: ghcr.io/elwqnn/me
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./documents:/usr/share/nginx/html/documents
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
